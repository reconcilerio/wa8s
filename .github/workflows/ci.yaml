name: CI

on:
  push:
    branches:
    - '**'
    - '!dependabot/**'
    tags:
    # semver tags
    - 'v[0-9]+\.[0-9]+\.[0-9]+-?**'
  pull_request: {}

env:
  IMGPKG: go run -modfile hack/imgpkg/go.mod carvel.dev/imgpkg/cmd/imgpkg
  KAPP: go run -modfile hack/kapp/go.mod carvel.dev/kapp/cmd/kapp
  KBLD: go run -modfile hack/kbld/go.mod carvel.dev/kbld/cmd/kbld
  KO: go run -modfile hack/ko/go.mod github.com/google/ko
  STERN: go run -modfile hack/stern/go.mod go run -modfile hack/stern/go.mod github.com/stern/stern
  YTT: go run -modfile hack/ytt/go.mod carvel.dev/ytt/cmd/ytt

jobs:

  unit:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache-dependency-path: '**/*.sum'
    - uses: actions-rust-lang/setup-rust-toolchain@v1
    - name: Install cargo binstall
      uses: cargo-bins/cargo-binstall@main
    - name: Install cargo component
      run: cargo binstall --force cargo-component
    - name: Install wasm-tools
      run: cargo binstall --force wasm-tools
    - name: Test
      run: make test
    - name: Lint
      run: make lint
    - name: Report coverage
      uses: codecov/codecov-action@v6
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    - name: Disallow generated drift
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail

        git diff --exit-code .

  stage:
    name: Stage
    runs-on: ubuntu-latest
    env:
      REGISTRY_NAME: registry.local
      KO_DOCKER_REPO: registry.local/wa8s
      KO_PLATFORMS: linux/amd64,linux/arm64
      BUNDLE: registry.local/wa8s/bundle
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache-dependency-path: '**/*.sum'
    - uses: actions-rust-lang/setup-rust-toolchain@v1
    - name: Install cargo binstall
      uses: cargo-bins/cargo-binstall@main
    - name: Install cargo component
      run: cargo binstall --force cargo-component
    - name: Install wasm-tools
      run: cargo binstall --force wasm-tools
    - name: Generate certs
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail

        CERT_DIR=$(mktemp -d -t certs.XXXX)
        echo "CERT_DIR=$CERT_DIR" >> $GITHUB_ENV

        echo "##[group]Install cfssl"
          curl -L https://github.com/cloudflare/cfssl/releases/download/v1.6.5/cfssl_1.6.5_linux_amd64 -o cfssl
          curl -L https://github.com/cloudflare/cfssl/releases/download/v1.6.5/cfssljson_1.6.5_linux_amd64 -o cfssljson
          chmod +x cfssl*
          sudo mv cfssl* /usr/local/bin
        echo "##[endgroup]"

        echo "##[group]Generate CA"
          cfssl gencert -initca .github/tls/root-csr.json \
            | cfssljson -bare ${CERT_DIR}/root-ca
          cfssl gencert -ca ${CERT_DIR}/root-ca.pem -ca-key ${CERT_DIR}/root-ca-key.pem \
            -config=".github/tls/config.json" \
            -profile="intermediate" .github/tls/intermediate-csr.json \
            | cfssljson -bare ${CERT_DIR}/signing-ca
          cat ${CERT_DIR}/signing-ca.pem ${CERT_DIR}/root-ca.pem > ${CERT_DIR}/ca.pem
        echo "##[endgroup]"
        echo "##[group]Install CA"
          # https://ubuntu.com/server/docs/security-trust-store
          sudo apt-get install -y ca-certificates
          sudo cp ${CERT_DIR}/ca.pem /usr/local/share/ca-certificates/ca.crt
          sudo update-ca-certificates
        echo "##[endgroup]"

        echo "##[group]Generate cert"
          cfssl gencert -ca ${CERT_DIR}/signing-ca.pem -ca-key ${CERT_DIR}/signing-ca-key.pem \
            -config=".github/tls/config.json" \
            -profile="server" \
            -hostname="${REGISTRY_NAME},local-registry" \
            .github/tls/server-csr.json \
            | cfssljson -bare ${CERT_DIR}/server
        echo "##[endgroup]"

    - name: Setup local registry
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail

        # Run a registry.
        docker run -d \
          --restart=always \
          --name local-registry \
          -v ${CERT_DIR}:/certs \
          -e REGISTRY_HTTP_ADDR=0.0.0.0:443 \
          -e REGISTRY_HTTP_TLS_CERTIFICATE=/certs/server.pem \
          -e REGISTRY_HTTP_TLS_KEY=/certs/server-key.pem \
          -p "443:443" \
          registry:2

        # Make the $REGISTRY_NAME -> local-registry
        echo "$(hostname -I | cut -d' ' -f1) $REGISTRY_NAME" | sudo tee -a /etc/hosts
    - name: Build all platforms for tags
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        echo "KO_PLATFORMS=all" >> $GITHUB_ENV
    - name: Build
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail

        scratch=$(mktemp -d -t bundle.XXXX)
        mkdir -p "${scratch}/.imgpkg"
        mkdir -p "${scratch}/config"

        cp LICENSE "${scratch}/LICENSE"
        cp -R config/kapp "${scratch}/kapp"

        echo "##[group]Build components"
          make components
        echo "##[endgroup]"

        echo "##[group]Build"
          cat hack/boilerplate.yaml.txt > "${scratch}/config/reconcilerio-wa8s.yaml"
          ${KO} resolve --platform ${KO_PLATFORMS} -f config/wa8s.yaml >> "${scratch}/config/reconcilerio-wa8s.yaml"
          
          cat hack/boilerplate.yaml.txt > "${scratch}/config/reconcilerio-wa8s-knative.yaml"
          ${KO} resolve --platform ${KO_PLATFORMS} -f config/wa8s-knative.yaml >> "${scratch}/config/reconcilerio-wa8s-knative.yaml"
          
          cat hack/boilerplate.yaml.txt > "${scratch}/config/reconcilerio-wa8s-services.yaml"
          ${KO} resolve --platform ${KO_PLATFORMS} -f config/wa8s-services.yaml >> "${scratch}/config/reconcilerio-wa8s-services.yaml"

          ${KBLD} --imgpkg-lock-output "${scratch}/.imgpkg/images.yml" \
            -f "${scratch}/config/reconcilerio-wa8s.yaml" \
            -f "${scratch}/config/reconcilerio-wa8s-knative.yaml" \
            -f "${scratch}/config/reconcilerio-wa8s-services.yaml" \
            > /dev/null
        echo "##[endgroup]"

        echo "##[group]Create bundle"
          ${IMGPKG} push -f "${scratch}" -b "${BUNDLE}"
          ${IMGPKG} copy -b "${BUNDLE}" --to-tar reconcilerio-wa8s-bundle.tar
        echo "##[endgroup]"
    - uses: actions/upload-artifact@v7
      with:
        name: reconcilerio-wa8s-bundle.tar
        path: reconcilerio-wa8s-bundle.tar
        retention-days: 7

  acceptance:
    name: Acceptance Test
    needs: stage
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - node: kindest/node:v1.35.1@sha256:05d7bcdefbda08b4e038f644c4df690cdac3fba8b06f8289f30e10026720a1ab
          version: v1.35.1
          os: ubuntu-latest
    env:
      REGISTRY_NAME: registry.local
      BUNDLE: registry.local/bundle
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache-dependency-path: '**/*.sum'
    - name: Install kind
      run: |
        cd $(mktemp -d -t kind.XXXX)
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-$(go env GOHOSTOS)-$(go env GOHOSTARCH)
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin
        cd -
    - name: Generate certs
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail

        CERT_DIR=$(mktemp -d -t certs.XXXX)
        echo "CERT_DIR=$CERT_DIR" >> $GITHUB_ENV

        echo "##[group]Install cfssl"
          curl -L https://github.com/cloudflare/cfssl/releases/download/v1.6.5/cfssl_1.6.5_linux_amd64 -o cfssl
          curl -L https://github.com/cloudflare/cfssl/releases/download/v1.6.5/cfssljson_1.6.5_linux_amd64 -o cfssljson
          chmod +x cfssl*
          sudo mv cfssl* /usr/local/bin
        echo "##[endgroup]"

        echo "##[group]Generate CA"
          cfssl gencert -initca .github/tls/root-csr.json \
            | cfssljson -bare ${CERT_DIR}/root-ca
          cfssl gencert -ca ${CERT_DIR}/root-ca.pem -ca-key ${CERT_DIR}/root-ca-key.pem \
            -config=".github/tls/config.json" \
            -profile="intermediate" .github/tls/intermediate-csr.json \
            | cfssljson -bare ${CERT_DIR}/signing-ca
          cat ${CERT_DIR}/signing-ca.pem ${CERT_DIR}/root-ca.pem > ${CERT_DIR}/ca.pem
        echo "##[endgroup]"
        echo "##[group]Install CA"
          # https://ubuntu.com/server/docs/security-trust-store
          sudo apt-get install -y ca-certificates
          sudo cp ${CERT_DIR}/ca.pem /usr/local/share/ca-certificates/ca.crt
          sudo update-ca-certificates
        echo "##[endgroup]"

        echo "##[group]Generate cert"
          cfssl gencert -ca ${CERT_DIR}/signing-ca.pem -ca-key ${CERT_DIR}/signing-ca-key.pem \
            -config=".github/tls/config.json" \
            -profile="server" \
            -hostname="${REGISTRY_NAME},local-registry" \
            .github/tls/server-csr.json \
            | cfssljson -bare ${CERT_DIR}/server
        echo "##[endgroup]"
    - name: Setup local registry
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail

        # Run a registry.
        docker run -d \
          --restart=always \
          --name local-registry \
          -v ${CERT_DIR}:/certs \
          -e REGISTRY_HTTP_ADDR=0.0.0.0:443 \
          -e REGISTRY_HTTP_TLS_CERTIFICATE=/certs/server.pem \
          -e REGISTRY_HTTP_TLS_KEY=/certs/server-key.pem \
          -p "443:443" \
          registry:2

        # Make the $REGISTRY_NAME -> local-registry
        echo "$(hostname -I | cut -d' ' -f1) $REGISTRY_NAME" | sudo tee -a /etc/hosts
    - name: Create Cluster
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail

        # define containerd host config for registry
        cat <<EOF > ${CERT_DIR}/hosts.toml
        server = "https://${REGISTRY_NAME}"

        [host."https://${REGISTRY_NAME}"]
          capabilities = ["pull"]
          ca = "/etc/containerd/certs.d/${REGISTRY_NAME}/ca.pem"
        EOF

        # create a cluster with the local registry enabled in containerd
        cat <<EOF | kind create cluster --config=-
        kind: Cluster
        apiVersion: kind.x-k8s.io/v1alpha4
        containerdConfigPatches:
        - |-
          [plugins."io.containerd.grpc.v1.cri".registry]
            config_path = "/etc/containerd/certs.d"
        nodes:
        - role: control-plane
          image: ${{ matrix.node }}
          extraMounts:
          - containerPath: /etc/containerd/certs.d/${REGISTRY_NAME}
            hostPath: ${CERT_DIR}
        EOF

        # connect the registry to the cluster network
        docker network connect kind local-registry

        # Document the local registry
        # https://github.com/kubernetes/enhancements/tree/master/keps/sig-cluster-lifecycle/generic/1755-communicating-a-local-registry
        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: local-registry-hosting
          namespace: kube-public
        data:
          localRegistryHosting.v1: |
            host: "${REGISTRY_NAME}"
            hostFromClusterNetwork: "${REGISTRY_NAME}"
            hostFromContainerRuntime: "${REGISTRY_NAME}"
            help: "https://kind.sigs.k8s.io/docs/user/local-registry/"
        EOF
    - name: Download staged bundle
      uses: actions/download-artifact@v8
      with:
        name: reconcilerio-wa8s-bundle.tar
    - name: Relocate bundle
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail

        ${IMGPKG} copy --tar reconcilerio-wa8s-bundle.tar --to-repo "${BUNDLE}"
        mkdir -p bundle
        ${IMGPKG} pull -b "${BUNDLE}" -o bundle
    - name: Deploy
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail

        echo "##[group]Create apps namespace"
          kubectl create ns apps
        echo "##[endgroup]"

        echo "##[group]Deploy cert-manager"
          ${KAPP} deploy -a cert-manager -n apps --wait-timeout 5m -y \
            -f https://github.com/cert-manager/cert-manager/releases/download/v1.19.2/cert-manager.yaml
        echo "##[endgroup]"

        echo "##[group]Deploy knative-serving"
          ${KAPP} deploy -a knative-serving -n apps --wait-timeout 5m -y \
            -f <( \
              ${YTT} \
                --data-value service-type=ClusterIP \
                --data-value ingress-class=kourier.ingress.networking.knative.dev \
                -f config/overlays/knative-ingress-class.yaml \
                -f config/overlays/knative-no-loadbalancer.yaml \
                -f https://github.com/knative/serving/releases/download/knative-v1.21.2/serving-crds.yaml \
                -f https://github.com/knative/serving/releases/download/knative-v1.21.2/serving-core.yaml \
                -f https://github.com/knative-extensions/net-kourier/releases/download/knative-v1.21.0/kourier.yaml \
            )
        echo "##[endgroup]"
        
        echo "##[group]Deploy reconcilerio-ducks"
          ${KAPP} deploy -a reconcilerio-ducks -n apps --wait-timeout 5m -y \
            -f https://github.com/reconcilerio/ducks/releases/download/v0.4.0/reconcilerio-ducks-v0.4.0.yaml
        echo "##[endgroup]"

        echo "##[group]Deploy reconcilerio-wa8s"
          kubectl create secret generic local-ca \
            --namespace wa8s-system \
            --type kubernetes.io/tls \
            --from-file ca.crt=${CERT_DIR}/ca.pem \
            --from-file tls.crt=${CERT_DIR}/server.pem \
            --from-file tls.key=${CERT_DIR}/server-key.pem \
            --dry-run=client \
            -oyaml > ca.yaml

          # unindent to preserve whitespace
        cat << EOF > clusterrepository.yaml
        apiVersion: registries.wa8s.reconciler.io/v1alpha1
        kind: ClusterRepository
        metadata:
          name: external
        spec:
          template: ${REGISTRY_NAME}/{{ .Kind }}/{{ .UID }}:{{ .ResourceVersion }}
        EOF

          ${KAPP} deploy -a reconcilerio-wa8s -n apps --wait-timeout 5m -y \
            -f <(${KBLD} -f bundle/.imgpkg/images.yml -f bundle/config/reconcilerio-wa8s.yaml) \
            -f bundle/kapp \
            -f ca.yaml \
            -f clusterrepository.yaml
        echo "##[endgroup]"

        echo "##[group]Deploy reconcilerio-wa8s-knative"
          ${KAPP} deploy -a reconcilerio-wa8s-knative -n apps --wait-timeout 5m -y \
            -f <(${KBLD} -f bundle/.imgpkg/images.yml -f bundle/config/reconcilerio-wa8s-knative.yaml) \
            -f bundle/kapp
        echo "##[endgroup]"

        echo "##[group]Deploy reconcilerio-wa8s-services"
          ${KAPP} deploy -a reconcilerio-wa8s-services -n apps --wait-timeout 5m -y \
            -f <(${KBLD} -f bundle/.imgpkg/images.yml -f bundle/config/reconcilerio-wa8s-services.yaml) \
            -f bundle/kapp
        echo "##[endgroup]"
    - name: Valkey service
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail

        echo "##[group]kubectl apply -f examples/valkey-service/prereq/"
          kubectl apply -f examples/valkey-service/prereq/
          kubectl wait deployments.apps/valkey -n wa8s-service-valkey --for condition=available --timeout 1m
          kubectl wait serviceresourcedefinitions.services.wa8s.reconciler.io/valkey --for condition=ready --timeout 5m
        echo "##[endgroup]"

        echo "##[group]kubectl apply -f examples/valkey-service/"
          kubectl apply -f examples/valkey-service/
          kubectl wait valkeys.x.services.wa8s.reconciler.io/my-valkey --for condition=ready --timeout 5m
          kubectl wait valkeyclients.x.services.wa8s.reconciler.io/my-valkey --for condition=ready --timeout 5m
          kubectl wait servicetrigger.knative.wa8s.reconciler.io/incrementor --for condition=ready --timeout 5m
        echo "##[endgroup]"

        echo "##[group]invoke incrementor"
          kubectl port-forward -n kourier-system svc/kourier-internal 8080:80 &
          kpf_pid=$!
          while ! nc -z localhost 8080 </dev/null; do sleep 1; done

          host="incrementor.default.svc.cluster.local"

          count=$(curl -s -H "Host: ${host}" http://localhost:8080/hello)
          if [ "${count}" == "1" ]; then
            echo "/hello count: ${count}"
          else
            echo "Unexpected /hello count: got ${count}, wanted 1"
            exit 1
          fi

          count=$(curl -s -H "Host: ${host}" http://localhost:8080/greeting)
          if [ "${count}" == "1" ]; then
            echo "/greeting count: ${count}"
          else
            echo "Unexpected /greeting count: got ${count}, wanted 1"
            exit 1
          fi

          count=$(curl -s -H "Host: ${host}" http://localhost:8080/hello)
          if [ "${count}" == "2" ]; then
            echo "/hello count: ${count}"
          else
            echo "Unexpected /hello count: got ${count}, wanted 2"
            exit 1
          fi

          count=$(curl -s -H "Host: ${host}" http://localhost:8080/greeting)
          if [ "${count}" == "2" ]; then
            echo "/greeting count: ${count}"
          else
            echo "Unexpected /greeting count: got ${count}, wanted 2"
            exit 1
          fi

          kill ${kpf_pid}
        echo "##[endgroup]"

    - name: Collect diagnostics
      run: ./.github/workflows/diagnostics.sh
      if: always()
      continue-on-error: true

    - name: Delete Gracefully
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail

        echo "##[group]Delete Valkey service"
          kubectl delete -f examples/valkey-service/04-*.yaml --timeout 1m
          kubectl delete -f examples/valkey-service/03-*.yaml --timeout 1m
          kubectl delete -f examples/valkey-service/02-*.yaml --timeout 1m
          kubectl delete -f examples/valkey-service/prereq/01-*.yaml --timeout 1m
          kubectl delete -f examples/valkey-service/prereq/00-*.yaml --timeout 1m
        echo "##[endgroup]"
        echo "##[group]Delete reconcilerio-wa8s-services"
          ${KAPP} delete -a reconcilerio-wa8s-services -n apps --wait-timeout 5m -y
        echo "##[endgroup]"
        echo "##[group]Delete reconcilerio-wa8s-knative"
          ${KAPP} delete -a reconcilerio-wa8s-knative -n apps --wait-timeout 5m -y
        echo "##[endgroup]"
        echo "##[group]Delete reconcilerio-wa8s"
          ${KAPP} delete -a reconcilerio-wa8s -n apps --wait-timeout 5m -y
        echo "##[endgroup]"
        echo "##[group]Delete reconcilerio-ducks"
          ${KAPP} delete -a reconcilerio-ducks -n apps --wait-timeout 5m -y
        echo "##[endgroup]"
        echo "##[group]Delete knative-serving"
          ${KAPP} delete -a knative-serving -n apps --wait-timeout 5m -y
        echo "##[endgroup]"
        echo "##[group]Delete cert-manager"
          ${KAPP} delete -a cert-manager -n apps --wait-timeout 5m -y
        echo "##[endgroup]"
      if: always()

    - name: Collect diagnostics (on delete failure)
      run: ./.github/workflows/diagnostics.sh
      if: failure()
      continue-on-error: true

    - name: Cleanup cluster
      run: kind delete cluster
      if: always()

  # aggregate the unit and acceptance results into a single job
  test:
    name: Test
    needs:
    - unit
    - acceptance
    runs-on: ubuntu-latest
    steps:
    - run: echo "it passed"

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
    - test
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache-dependency-path: '**/*.sum'
    - name: Get the version
      id: get_version
      run: echo ::set-output name=VERSION::${GITHUB_REF/refs\/tags\//}
    - name: Download staged bundle
      uses: actions/download-artifact@v8
      with:
        name: reconcilerio-wa8s-bundle.tar
    - name: Install crane
      run: |
        cd $(mktemp -d -t crane.XXXX)
        curl -L https://github.com/google/go-containerregistry/releases/download/v0.9.0/go-containerregistry_Linux_x86_64.tar.gz | tar -xz
        chmod +x ./crane
        sudo mv ./crane /usr/local/bin
        cd -
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Relocate bundle to public registry
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail

        version=${{ steps.get_version.outputs.VERSION }}

        ${IMGPKG} copy --tar reconcilerio-wa8s-bundle.tar --to-repo "ghcr.io/${{ github.repository }}/bundle"
        crane tag "ghcr.io/${{ github.repository }}/bundle" "${version}"
        digest=$(crane digest "ghcr.io/${{ github.repository }}/bundle:${version}")

        scratch=$(mktemp -d -t bundle.XXXX)
        mkdir -p ${scratch}
        ${IMGPKG} pull -b "ghcr.io/${{ github.repository }}/bundle:${version}@${digest}" -o ${scratch}

        cp hack/boilerplate.yaml.txt reconcilerio-wa8s.yaml
        ${KBLD} -f ${scratch}/config/reconcilerio-wa8s.yaml -f ${scratch}/.imgpkg/images.yml \
          >> reconcilerio-wa8s.yaml

        cp hack/boilerplate.yaml.txt reconcilerio-wa8s-knative.yaml
        ${KBLD} -f ${scratch}/config/reconcilerio-wa8s-knative.yaml -f ${scratch}/.imgpkg/images.yml \
          >> reconcilerio-wa8s-knative.yaml

        cp hack/boilerplate.yaml.txt reconcilerio-wa8s-services.yaml
        ${KBLD} -f ${scratch}/config/reconcilerio-wa8s-services.yaml -f ${scratch}/.imgpkg/images.yml \
          >> reconcilerio-wa8s-services.yaml
    - name: Rename artifacts with version
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail
    
        version=${{ steps.get_version.outputs.VERSION }}

        cp reconcilerio-wa8s-bundle.tar reconcilerio-wa8s-bundle-${version}.tar
        cp reconcilerio-wa8s.yaml reconcilerio-wa8s-${version}.yaml
        cp reconcilerio-wa8s-knative.yaml reconcilerio-wa8s-knative-${version}.yaml
        cp reconcilerio-wa8s-services.yaml reconcilerio-wa8s-services-${version}.yaml
    - name: Draft GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        draft: true
        files: |
          reconcilerio-wa8s-bundle-${{ steps.get_version.outputs.VERSION }}.tar
          reconcilerio-wa8s-${{ steps.get_version.outputs.VERSION }}.yaml
          reconcilerio-wa8s-knative-${{ steps.get_version.outputs.VERSION }}.yaml
          reconcilerio-wa8s-services-${{ steps.get_version.outputs.VERSION }}.yaml
        fail_on_unmatched_files: true
        token: ${{ secrets.GITHUB_TOKEN }}
