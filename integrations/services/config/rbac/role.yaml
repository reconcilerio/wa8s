  verbs:
  - get
  - patch
  - update
- apiGroups:
  - wa8s.reconciler.io
  resources:
  - componentducks
  - components
  - compositions
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
