apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: wa8s-knative
    app.kubernetes.io/managed-by: kustomize
  name: wa8s-knative-manager-aggregate-role
aggregationRule:
  clusterRoleSelectors:
  - matchExpressions:
    - key: knative.wa8s.reconciler.io/manager
      operator: Exists
  - matchLabels:
      ducks.reconciler.io/role: view
      ducks.reconciler.io/type: componentducks.wa8s.reconciler.io
rules: [] # The control plane automatically fills in the rules

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/name: wa8s-knative
    app.kubernetes.io/managed-by: kustomize
  name: wa8s-knative-manager-aggregate-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wa8s-knative-manager-aggregate-role
subjects:
- kind: ServiceAccount
  name: wa8s-knative-manager
