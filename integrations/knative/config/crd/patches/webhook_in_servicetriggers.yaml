# The following patch enables a conversion webhook for the CRD
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: servicetriggers.knative.wa8s.reconciler.io
spec:
  conversion:
    strategy: Webhook
    webhook:
      clientConfig:
        service:
          name: wa8s-knative-manager-webhook
          path: /convert
      conversionReviewVersions:
      - v1
