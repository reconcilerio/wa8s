---
apiVersion: v1
kind: Service
metadata:
  name: wa8s-services-manager-webhook
  namespace: wa8s-system
spec:
  ports:
  - name: http
    port: 80
    targetPort: 9080
  - name: https
    port: 443
    targetPort: 9443
  selector:
    control-plane: wa8s-services-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: wa8s
    control-plane: wa8s-services-manager
  name: wa8s-services-manager
  namespace: wa8s-system
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: wa8s-services-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: wa8s-services-manager
    spec:
      containers:
      - args:
        - --leader-elect
        - --health-probe-bind-address=:8081
        env:
        - name: WA8S_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: ko://reconciler.io/wa8s/integrations/services/internal/cmd
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 1
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
      securityContext:
        runAsNonRoot: true
      serviceAccountName: wa8s-services-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - name: cert
        secret:
          defaultMode: 420
          secretName: wa8s-services-webhook-server-cert
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wa8s-services-webhook-serving-cert
  namespace: wa8s-system
spec:
  dnsNames:
  - wa8s-services-manager-webhook.wa8s-system.svc
  - wa8s-services-manager-webhook.wa8s-system.svc.cluster.local
  issuerRef:
    kind: Issuer
